{% load static %}
{% load pwa %}

<!DOCTYPE html>
<html lang="de">
    <head>
        <!-- PWA META -->
        {% progressive_web_app_meta %}
        <meta charset="utf-8" />
        <title>{% block title %} {{ softwarename }} {% endblock %}</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="Jonathan Glässel" />
        <!-- Favicon icon -->
        <link rel="icon" href="{% static 'images/favicon.png' %}" type="image/png">
        <!-- Bootstrap CSS via CDN -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <!-- Fontawesome für Icons -->
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
        <!-- Custom CSS for BASE.html -->
        <link rel="stylesheet" href="{% static 'css/desktop.css' %}">
        <link rel="stylesheet" href="{% static 'css/mobile.css' %}">
    </head>

    <body>
        {% include 'web/partials/navbar.html' %}
        {% block content %}
        <main class="container welcome-container text-center">
            <h1>Herzlich Willkommen auf der Startseite</h1><br>
        </main>
        {% endblock %}
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- Custom JS -->
    <script src="/static/js/utils.js"></script>
    </body>
</html>
