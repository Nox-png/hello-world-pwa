name: django-ci-docker

on:
  workflow_run:
    workflows:
      - Django Tests
    types:
      - completed
    branches:
      - main
      - master
      - dev

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest

    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Versionsinformationen auslesen
        id: versionInfo
        run: |
          python <<'PY'
          import os
          import re
          from pathlib import Path

          contextProcessorPath = Path("app/web/context_processors.py")

          if not contextProcessorPath.exists():
              raise SystemExit(f"Datei wurde nicht gefunden: {contextProcessorPath}")

          content = contextProcessorPath.read_text(encoding="utf-8")

          versionNumberMatch = re.search(r'versionNumber\s*=\s*"([^"]+)"', content)
          buildNumberMatch = re.search(r'buildNumber\s*=\s*"([^"]+)"', content)

          if not versionNumberMatch:
              raise SystemExit("versionNumber wurde nicht gefunden.")

          if not buildNumberMatch:
              raise SystemExit("buildNumber wurde nicht gefunden.")

          versionNumber = versionNumberMatch.group(1)
          buildNumber = buildNumberMatch.group(1)
          imageVersionTag = f"{versionNumber}-{buildNumber}"

          githubOutputPath = os.environ["GITHUB_OUTPUT"]

          with open(githubOutputPath, "a", encoding="utf-8") as githubOutput:
              githubOutput.write(f"versionNumber={versionNumber}\n")
              githubOutput.write(f"buildNumber={buildNumber}\n")
              githubOutput.write(f"imageVersionTag={imageVersionTag}\n")

          print(f"Version: {versionNumber}")
          print(f"Build: {buildNumber}")
          print(f"Image Tag: {imageVersionTag}")
          PY

      - name: Docker Tags prüfen
        run: |
          echo "Version Number: ${{ steps.versionInfo.outputs.versionNumber }}"
          echo "Build Number: ${{ steps.versionInfo.outputs.buildNumber }}"
          echo "Image Version Tag: ${{ steps.versionInfo.outputs.imageVersionTag }}"

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei GitHub Container Registry anmelden
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Image bauen und veröffentlichen
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.versionInfo.outputs.imageVersionTag }}